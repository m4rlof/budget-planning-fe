<app-page-breadcrumb pageTitle="Create new Goal" />
<div class="grid grid-cols-12 gap-6">
    <div class="col-span-12 space-y-6">
        @if(loading){
        <div class="flex items-center justify-center">
            <app-spinner></app-spinner>
        </div>
        } @else {
        <div class="bg-white border border-gray-200 dark:bg-white/[0.03] dark:border-gray-800 rounded-2xl">
            <form [formGroup]="form">
                <div class="space-y-6 p-4 border-t border-gray-100 dark:border-gray-800 sm:p-6">
                    <div>
                        <app-label for="amount">Name</app-label>
                        <app-input-field type="text" id="name" placeholder="Goal's name"
                            [value]="form.get('name')?.value" (valueChange)="form.get('name')?.setValue($event)" />
                    </div>
                    <div>
                        <app-label for="amount">Amount</app-label>
                        <app-input-field type="number" id="target_amount" placeholder="Goal's amount"
                            [value]="form.get('target_amount')?.value"
                            (valueChange)="form.get('target_amount')?.setValue($event)" />
                    </div>
                    <div>
                        <app-date-picker (dateChange)="onStartDateChange($event)" id="date-picker" label="Start Date"
                            placeholder="Select a date" />
                    </div>
                    <div>
                        <app-date-picker (dateChange)="onEndDateChange($event)" id="date-picker" label="End Date"
                            placeholder="Select a date" />
                    </div>

                    <div>
                        <div class="flex gap-3 justify-end">
                            <app-button size="sm" (btnClick)="createPlaning()" [disabled]="!form.valid">
                                Create goal
                            </app-button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
        }
    </div>
</div>
