<div class="grid grid-cols-12 gap-6 w-full">
    <div class="col-span-5">
        <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6">
            <div class="flex items-center justify-center w-12 h-12 bg-gray-100 rounded-xl dark:bg-gray-800"
                [innerHTML]="icons.groupIcon | safeHtml">
            </div>
            <div class="flex items-end justify-between mt-5">
                <div>
                    <span class="text-sm text-gray-500 dark:text-gray-400">Current month economy</span>
                    <h4 class="mt-2 font-bold text-gray-800 text-title-sm dark:text-white/90">{{insight.saving}}€</h4>
                </div>
                <app-badge color="success">
                    {{insight.savingPercentage}}%
                </app-badge>
            </div>
        </div>
    </div>
    <div class="col-span-7">
        <div class="rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-white/[0.03] md:p-6">
            <div class="flex items-start justify-between">
                <h3 class="text-lg font-semibold text-gray-800 dark:text-white/90">
                    Top expenses by categories
                </h3>
            </div>

            <div class="my-6">
                <div class="flex items-center justify-between pb-4 border-b border-gray-100 dark:border-gray-800">
                    <span class="text-gray-400 text-theme-xs"> Category </span>
                    <span class="text-right text-gray-400 text-theme-xs"> Amount </span>
                </div>
                @for (category of categories; track $index) {
                <div class="flex items-center justify-between py-3 border-b border-gray-100 dark:border-gray-800">
                    <span class="text-gray-500 text-theme-sm dark:text-gray-400">
                        {{ normalizestr(category.name) }}
                    </span>
                    <span class="text-right text-gray-500 text-theme-sm dark:text-gray-400">{{ category.amount
                        }}€</span>
                </div>
                }
            </div>
        </div>
    </div>
</div>
